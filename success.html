<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Payment Successful – ElectricalFlo</title>
  <style>
    body {
      background: #0b1220;
      color: #e2e8f0;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 60px 20px;
    }
    .card {
      max-width: 600px;
      margin: auto;
      background: #0f172a;
      padding: 40px;
      border-radius: 14px;
      border: 1px solid #1f2937;
    }
    h1 {
      color: #22c55e;
    }
    a {
      color: #38bdf8;
      text-decoration: none;
      font-weight: bold;
    }
    .small {
      color: #94a3b8;
      font-size: 14px;
      margin-top: 12px;
      line-height: 1.5;
    }
    code {
      display: inline-block;
      margin-top: 8px;
      background: #111827;
      color: #cbd5e1;
      padding: 6px 10px;
      border-radius: 8px;
      word-break: break-all;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>✅ Payment Successful</h1>
  <p>Your payment was successful and your order is being finalized.</p>
  <p id="status"></p>
  <div class="small">
    You will receive an email confirmation shortly with your order details.
  </div>
  <div class="small">
    ElectricalFlo is operated by ElectricalFlo LLC.
  </div>
  <div id="details" class="small"></div>
  <br>
  <a href="/">Return to Shop</a>
</div>

<script>
  const WEBAPP_URL = "https://electricalflo.com/api/order";
  const SHARED_SECRET = "sfoshdfsjknfsldneuqdghaiudbdijfbkjfbaoshdEBFDJBFSJDFB";

  const statusEl = document.getElementById("status");
  const detailsEl = document.getElementById("details");

  const urlParams = new URLSearchParams(window.location.search);
  const sessionId = urlParams.get("session_id");

  async function confirmCheckout() {
    if (!sessionId) {
      statusEl.innerText = "Missing session ID.";
      return;
    }

    try {
      const res = await fetch(WEBAPP_URL, {
        method: "POST",
        mode: "cors",
        redirect: "follow",
        cache: "no-store",
        keepalive: true,
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify({
          action: "confirmCheckout",
          sessionId: sessionId,
          secret: SHARED_SECRET
        })
      });

      const text = await res.text();

      let data;
      try {
        data = JSON.parse(text);
      } catch (err) {
        throw new Error("Non-JSON response from server: " + text.slice(0, 200));
      }

      if (data.ok) {
        localStorage.removeItem("cart_v2");

        statusEl.innerText = "Order confirmed! Your payment has been recorded.";
        detailsEl.innerHTML = data.orderId
          ? `Order ID: <code>${data.orderId}</code>`
          : "Payment confirmed.";

        setTimeout(() => {
          window.location.href = "/";
        }, 4000);

      } else {
        statusEl.innerText = "Payment received, but confirmation failed.";
        detailsEl.innerHTML =
          `Stripe Session: <code>${sessionId}</code><br>` +
          `Error: ${data.error || "Unknown error"}`;
      }

    } catch (err) {
      statusEl.innerText = "Payment received, but confirmation failed.";
      detailsEl.innerHTML =
        `Stripe Session: <code>${sessionId}</code><br>` +
        `Error: ${err.message || err}`;
    }
  }

  confirmCheckout();
</script>

</body>
</html>
