<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>ElectricalFlo — Video Gallery</title>
  <meta name="description" content="ElectricalFlo product demo videos" />

  <meta property="og:title" content="ElectricalFlo — Video Gallery" />
  <meta property="og:description" content="Watch product demos without leaving the site." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://electricalflo.com/videos/" />
  <meta property="og:image" content="https://electricalflo.com/images/og-radio.jpg" />

  <link rel="stylesheet" href="../style.css" />

  <style>
    .galleryWrap{
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 16px 48px;
    }

    .galleryHero{
      margin: 8px 0 24px;
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(255,255,255,0.02);
    }

    .galleryHero h2{
      margin: 0 0 8px;
      font-size: 1.8rem;
      line-height: 1.15;
    }

    .galleryHero p{
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      max-width: 760px;
    }

    .galleryActions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .galleryGrid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 18px;
    }

    .videoCard{
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255,255,255,0.02);
      display:flex;
      flex-direction:column;
    }

    .videoThumb{
      aspect-ratio: 4 / 5;
      background: rgba(255,255,255,0.04);
      cursor: pointer;
      overflow: hidden;
    }

    .videoThumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .videoBody{
      padding: 14px;
      display:flex;
      flex-direction:column;
      gap: 10px;
    }

    .videoTitle{
      margin:0;
      font-size:1rem;
      line-height:1.35;
    }

    .videoMeta{
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .videoActions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top: 4px;
    }

    .topNav{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom: 16px;
    }

    .topNav .brandMini{
      display:flex;
      align-items:center;
      gap:12px;
      text-decoration:none;
      color:inherit;
    }

    .topNav .brandMini img{
      width:44px;
      height:44px;
      object-fit:contain;
    }

    .topNav .brandMiniText{
      display:flex;
      flex-direction:column;
      line-height:1.1;
    }

    .topNav .brandMiniText strong{
      font-size:1rem;
    }

    .topNav .brandMiniText span{
      color:var(--muted);
      font-size:0.9rem;
    }

    .topNavActions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .imgModal[hidden]{
      display:none !important;
    }

    .tiktokWrap{
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      min-height: 300px;
    }
  </style>
</head>
<body>

  <main class="galleryWrap">
    <div class="topNav">
      <a class="brandMini" href="../index.html" aria-label="Back to shop">
        <img src="../images/Logo.png" alt="ElectricalFlo Logo" />
        <div class="brandMiniText">
          <strong>ElectricalFlo</strong>
          <span>Back to Shop</span>
        </div>
      </a>

      <div class="topNavActions">
        <a class="ghost" href="../index.html">Shop</a>
        <a class="ghost" href="https://www.tiktok.com/@n2cfx" target="_blank" rel="noopener noreferrer">Follow @N2CFX</a>
      </div>
    </div>

    <section class="galleryHero">
      <h2>Video Gallery</h2>
      <p>
        Watch featured product demos without leaving the site. These are some of the best ElectricalFlo TikTok videos, embedded here for a cleaner shopping experience.
      </p>

      <div class="galleryActions">
        <a class="primary" href="../index.html">Shop Products</a>
        <a class="ghost" href="https://www.tiktok.com/@n2cfx" target="_blank" rel="noopener noreferrer">Open TikTok Profile</a>
      </div>
    </section>

    <section class="galleryGrid" id="galleryGrid"></section>
  </main>

  <!-- VIDEO MODAL -->
  <div class="imgModal" id="imgModal" hidden>
    <div class="imgModalBackdrop" id="imgModalBackdrop"></div>
    <div class="imgModalPanel" role="dialog" aria-modal="true" aria-label="Video viewer">
      <div class="imgModalHeader">
        <div class="imgModalTitle" id="imgModalTitle">Video</div>
        <button class="iconBtn" id="imgModalClose" type="button">✕</button>
      </div>

      <div class="imgModalMain">
        <div id="modalMedia" class="modalMedia"></div>
      </div>
    </div>
  </div>

<script>
const FEATURED_VIDEOS = [
  {
    title: "Motorola APX 6000 / 7000 / 8000 Cup Holder",
    tiktok: "https://www.tiktok.com/@n2cfx/video/7608698894289079582",
    image: "../images/IMG_1085.jpeg",
    productId: "apx-cupholder"
  },
  {
    title: "Motorola APX 6000XE / 8000XE Belt Clip Holster Cup Holder",
    tiktok: "https://www.tiktok.com/@n2cfx/video/7615730673558588703",
    image: "../images/APX_CLIP.jpg",
    productId: "apx-cupholder-wclip"
  },
  {
    title: "Motorola XTS2500 & XTS5000",
    tiktok: "https://www.tiktok.com/@n2cfx/video/7610552793476189471",
    image: "../images/XTS5000.JPG",
    productId: "xts5000-cupholder"
  },
  {
    title: "Motorola XPR Cup Holder",
    tiktok: "https://www.tiktok.com/@n2cfx/video/7604665291943054622",
    image: "../images/3A679986-23CA-4666-BBE3-BD70255B6A45_1_201_a.jpeg",
    productId: "xpr7550-cupholder"
  }
];

function getTikTokId(url){
  const m = String(url || "").match(/\/video\/(\d+)/);
  return m ? m[1] : "";
}

function clearTikTokFromModal(){
  const media = document.getElementById("modalMedia");
  if (!media) return;
  media.innerHTML = "";
}

function openTikTokByUrl(title, url){
  const postId = getTikTokId(url);
  if (!postId){
    alert("Invalid TikTok URL.");
    return;
  }

  document.getElementById("imgModalTitle").textContent = title || "TikTok Video";
  document.getElementById("imgModal").hidden = false;
  document.body.style.overflow = "hidden";

  clearTikTokFromModal();

  const media = document.getElementById("modalMedia");
  media.innerHTML = `
    <div class="tiktokWrap">
      <iframe
        src="https://www.tiktok.com/player/v1/${postId}?music_info=1&description=1"
        title="TikTok video player"
        style="width:min(520px,92vw); height:min(740px,74vh); border:0; border-radius:14px; overflow:hidden;"
        allow="fullscreen"
        allowfullscreen
      ></iframe>
    </div>
  `;
}

function closeLightbox(){
  document.getElementById("imgModal").hidden = true;
  document.body.style.overflow = "";
  clearTikTokFromModal();
}

function renderGallery(){
  const grid = document.getElementById("galleryGrid");
  if (!grid) return;

  grid.innerHTML = FEATURED_VIDEOS.map(v => `
    <article class="videoCard">
      <div class="videoThumb" onclick="openTikTokByUrl(${JSON.stringify(v.title)}, ${JSON.stringify(v.tiktok)})">
        <img src="${v.image}" alt="${v.title}" loading="lazy">
      </div>

      <div class="videoBody">
        <h3 class="videoTitle">${v.title}</h3>
        <div class="videoMeta">Watch the demo here on ElectricalFlo.</div>

        <div class="videoActions">
          <button class="primary" type="button" onclick="openTikTokByUrl(${JSON.stringify(v.title)}, ${JSON.stringify(v.tiktok)})">
            Watch Demo
          </button>

          ${
            v.productId
              ? `<a class="ghost" href="../index.html?cat=radio#${v.productId}">Shop Item</a>`
              : `<a class="ghost" href="../index.html">Shop Products</a>`
          }
        </div>
      </div>
    </article>
  `).join("");
}

document.getElementById("imgModalClose").addEventListener("click", closeLightbox);
document.getElementById("imgModalBackdrop").addEventListener("click", closeLightbox);
document.addEventListener("keydown", (e) => {
  if (document.getElementById("imgModal").hidden) return;
  if (e.key === "Escape") closeLightbox();
});

window.openTikTokByUrl = openTikTokByUrl;

renderGallery();
</script>

</body>
</html>
